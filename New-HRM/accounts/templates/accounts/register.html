{% load static %}

<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Employee Registration</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href="{% static 'css/login.css' %}">

</head>

<body>

<div class="container-fluid">

<div class="row vh-100">

<div class="col-lg-7 left-side">

<div class="overlay">

<h1>Create HRMS Account</h1>

<p>

Join the Human Resource Management System

</p>

</div>

</div>

<div class="col-lg-5 right-side">

<div class="login-card">

<h2 class="text-center mb-4">

Registration

</h2>

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label>Full Name</label>

<input
type="text"
name="full_name"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Username</label>

<input
type="text"
name="username"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Email</label>

<input
type="email"
name="email"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Phone</label>

<input
type="text"
name="phone"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Department</label>

<select
name="department"
class="form-control">

<option>Human Resource</option>

<option>IT</option>

<option>Finance</option>

<option>Sales</option>

<option>Marketing</option>

</select>

</div>

<div class="mb-3">

<label>Role</label>

<select
name="role"
class="form-control">

<option value="EMPLOYEE">

Employee

</option>

<option value="HR">

HR

</option>

<option value="ADMIN">

Admin

</option>

</select>

</div>

<div class="mb-3">

<label>Password</label>

<input
type="password"
id="password"
name="password"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Confirm Password</label>

<input
type="password"
id="confirm_password"
class="form-control"
required>

</div>

<button
class="btn btn-success w-100">

Register

</button>

</form>

<hr>

<div class="text-center">

Already have an account?

<a href="/">

Login

</a>

</div>

</div>

</div>

</div>

</div>

<script src="{% static 'js/register.js' %}"></script>

</body>

</html>
